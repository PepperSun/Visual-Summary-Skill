<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Icons · 3 styles</title>
<link rel="stylesheet" href="_cmp.css">
<style>
  .iconrow { display:flex;gap:18px;align-items:center;flex-wrap:wrap; }
  .ico-tile { width:56px;height:56px;display:flex;align-items:center;justify-content:center; }
  .ico-cap { font:600 11px/1.3 'Inter';margin-top:6px;text-align:center;display:block; }
  .ico-cell { display:flex;flex-direction:column;align-items:center;gap:2px; }
  .clear .ico-cap   { color:#4A5478; }
  .mature .ico-cap  { color:#3D332C; font-family:'Source Serif 4',serif;font-weight:400;font-style:italic; font-size:12px; }
  .vibrant .ico-cap { color:#0A0A0A; text-transform:uppercase; letter-spacing:0.04em; }

  /* Clear: rounded square tile, soft pastel */
  .clear .ico-tile  { background:#EFEBFF;border-radius:14px;color:#6151D6; }
  /* Mature: thin line, no fill */
  .mature .ico-tile { border:1px solid #1A1614;color:#1A1614;border-radius:0; }
  /* Vibrant: ink outline, yellow fill */
  .vibrant .ico-tile{ background:#FFD400;border:2px solid #0A0A0A;border-radius:50%;color:#0A0A0A; }
</style></head>
